
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Website</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #111827, #1f2937);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }

        .box {
            padding: 40px;
            border-radius: 20px;
            background: rgba(255,255,255,0.1);
            box-shadow: 0 0 20px rgba(0,0,0,0.4);
        }

        h1 {
            font-size: 42px;
            margin-bottom: 10px;
        }

        p {
            font-size: 18px;
            opacity: 0.8;
        }
    </style>
</head>

<body>

    <div class="box">
        <h1>Welcome</h1>
        <p>My first deployed website 🚀</p>
    </div>

</body>
</html>
